<!DOCTYPE html>
<html>
<head>
<title>Admin Login - Royal Shoes</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="adminBox">
<h2 style="text-align:center;">Admin Login</h2>

<input type="email" id="email" placeholder="Admin Email">
<input type="password" id="password" placeholder="Password">

<button id="loginBtn">Login</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// COPY firebaseConfig from index.html
const firebaseConfig = {
  apiKey: "AIzaSyAAiqozHvCE3SIdsZRNiWLU-Z0p435dx2M",
    authDomain: "royal-shoes-a0b34.firebaseapp.com",
    projectId: "royal-shoes-a0b34",
    storageBucket: "royal-shoes-a0b34.firebasestorage.app",
    messagingSenderId: "766621423045",
    appId: "1:766621423045:web:7ff1c478aede41fb78a7ac"
  
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", async ()=>{

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

try{
await signInWithEmailAndPassword(auth,email,password);
window.location="admin.html";   //redirect after successful login
//alert("Login Success");
//window.location="admin.html";
}catch(error){
alert("Invalid credentials");
}

});
// listen for auth state change and redirect
//import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


</script>

</body>
</html>
